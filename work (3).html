<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADYY — Lavori</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,700&family=DM+Mono:wght@400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070707;
    --fg: #f0ede6;
    --red: #cc0000;
    --dim: #0c0c0c;
    --border: rgba(255,255,255,0.05);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 200;
    background: rgba(13,13,13,0.96);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
    height: 50px;
    backdrop-filter: blur(10px);
  }

  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 900;
    color: var(--red);
    letter-spacing: 6px;
    text-decoration: none;
  }

  .nav-logo span { color: var(--red); }

  .nav-right { display: flex; align-items: center; gap: 28px; }

  .nav-back {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #444;
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-back:hover { color: var(--fg); }

  .lang-btns { display: flex; gap: 2px; }

  .lang-btn {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    padding: 5px 11px;
    border: 1px solid #1e1e1e;
    background: transparent;
    color: #444;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .lang-btn.active { background: var(--red); color: #fff; border-color: var(--red); }

  .page-header {
    margin-top: 50px;
    padding: 64px 40px 48px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .page-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(56px, 10vw, 120px);
    font-weight: 900;
    line-height: 0.88;
    letter-spacing: -3px;
  }

  .page-header h1 em { font-style: italic; color: var(--red); }

  .header-right {
    text-align: right;
    padding-bottom: 8px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .header-right span {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: #333;
    text-transform: uppercase;
  }

  /* VIDEO ITEM */
  .vi {
    position: relative;
    overflow: hidden;
    background: var(--dim);
  }

  .vi iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  .vi.l { padding-bottom: 56.25%; height: 0; }
  .vi.s { padding-bottom: 100%; height: 0; }

  /* BLOCK 1 — hero big left + two stacked right */
  .block-1 {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 10px;
    padding: 10px;
  }

  .block-1 .col-right {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .block-1 .col-right .vi.l {
    flex: 1;
    padding-bottom: 0;
    height: 0;
    min-height: 0;
  }

  /* make the two side videos fill equally */
  .block-1 .col-right {
    min-height: 0;
  }

  .block-1 .col-right .vi {
    flex: 1;
    padding-bottom: 56.25%;
    height: 0;
  }

  /* BLOCK 2 — three equal landscape */
  .block-2 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    padding: 0 10px 10px;
  }

  /* BLOCK 3 — one wide leftover */
  .block-3 {
    display: grid;
    grid-template-columns: 3fr 2fr;
    gap: 10px;
    padding: 0 10px 10px;
  }

  .block-3 .filler {
    background: #0f0f0f;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .block-3 .filler span {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: #1e1e1e;
    text-transform: uppercase;
  }

  /* SECTION DIVIDER */
  .sec-div {
    padding: 52px 40px 28px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .sec-div h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 900;
    letter-spacing: -1px;
    white-space: nowrap;
  }

  .sec-div h2 em { font-style: italic; color: var(--red); }

  .sec-div .line { flex: 1; height: 1px; background: var(--border); }

  .sec-div .tag {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--red);
    white-space: nowrap;
  }

  /* BLOCK 4 — 4 shorts */
  .block-4 {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 0 10px 10px;
  }

  /* BLOCK 5 — 2 shorts + 1 landscape wide */
  .block-5 {
    display: grid;
    grid-template-columns: 1fr 1fr 2fr;
    gap: 10px;
    padding: 0 10px 10px;
    align-items: start;
  }

  .block-5 .vi-wide {
    position: relative;
    overflow: hidden;
    background: var(--dim);
    padding-bottom: 50%;
    height: 0;
  }

  .block-5 .vi-wide iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  .block-5 .vi-wide:hover .vi-label { opacity: 1; }

  /* PHOTO MASONRY */
  .photo-masonry {
    padding: 0 10px 10px;
    columns: 3;
    column-gap: 10px;
  }

  .photo-item {
    break-inside: avoid;
    margin-bottom: 10px;
    background: var(--dim);
  }

  .photo-item img {
    width: 100%;
    height: auto;
    display: block;
  }

  .photo-placeholder {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
  }

  .photo-placeholder span {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.2em;
    color: #1e1e1e;
    text-transform: uppercase;
    padding: 16px;
  }

  footer {
    padding: 24px 40px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 52px;
  }

  .wordmark {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 900;
    letter-spacing: 6px;
  }

  .wordmark span { color: var(--red); }

  footer p {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: #222;
    letter-spacing: 0.15em;
  }

  [data-lang="en"] { display: none; }
  [data-lang="it"] { display: block; }
  span[data-lang="en"] { display: none; }
  span[data-lang="it"] { display: inline; }
  body.lang-en [data-lang="it"] { display: none; }
  body.lang-en [data-lang="en"] { display: block; }
  body.lang-en span[data-lang="it"] { display: none; }
  body.lang-en span[data-lang="en"] { display: inline; }

  @media (max-width: 768px) {
    nav { padding: 0 20px; }
    .page-header { padding: 40px 20px 32px; flex-direction: column; gap: 16px; align-items: flex-start; }
    .block-1 { grid-template-columns: 1fr; }
    .block-1 .col-right { flex-direction: row; }
    .block-2, .block-3 { grid-template-columns: 1fr; }
    .block-4 { grid-template-columns: 1fr 1fr; }
    .block-5 { grid-template-columns: 1fr 1fr; }
    .block-5 .vi-wide { grid-column: span 2; }
    .photo-masonry { columns: 2; }
    .sec-div { padding: 36px 20px 20px; }
    footer { padding: 20px; flex-direction: column; gap: 8px; }
    /* Mobile: fix short grid padding */
    [style*="padding:10px 80px"] { padding: 10px !important; }
    /* Ensure iframes are fully tappable */
    .vi, .vi-wide { -webkit-overflow-scrolling: touch; }
    .vi iframe, .vi-wide iframe { touch-action: auto; pointer-events: auto; }
  }

  @media (max-width: 480px) {
    .block-4 { grid-template-columns: 1fr 1fr; }
    .photo-masonry { columns: 1; }
    .block-1 .col-right { flex-direction: column; }
  }
</style>
</head>
