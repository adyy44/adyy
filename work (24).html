<style>
  :root {
    --bg: #070707;
    --fg: #f0ede6;
    --red: #cc0000;
    --dim: #0c0c0c;
    --border: rgba(255,255,255,0.05);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 200;
    background: rgba(13,13,13,0.96);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
    height: 50px;
    backdrop-filter: blur(10px);
  }

  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 900;
    color: var(--red);
    letter-spacing: 6px;
    text-decoration: none;
  }

  .nav-logo span { color: var(--red); }

  .nav-right { display: flex; align-items: center; gap: 28px; }

  .nav-back {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #444;
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-back:hover { color: var(--fg); }

  .lang-btns { display: flex; gap: 2px; }

  .lang-btn {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    padding: 5px 11px;
    border: 1px solid #1e1e1e;
    background: transparent;
    color: #444;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .lang-btn.active { background: var(--red); color: #fff; border-color: var(--red); }

  .page-header {
    margin-top: 50px;
    padding: 64px 40px 48px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .page-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(56px, 10vw, 120px);
    font-weight: 900;
    line-height: 0.88;
    letter-spacing: -3px;
  }

  .page-header h1 em { font-style: italic; color: var(--red); }

  .header-right {
    text-align: right;
    padding-bottom: 8px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .header-right span {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: #333;
    text-transform: uppercase;
  }

  /* VIDEO ITEM */
  .vi {
    position: relative;
    overflow: hidden;
    background: var(--dim);
  }

  .vi iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  .vi video {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    border: none;
  }

  .vi.l { padding-bottom: 56.25%; height: 0; }
  .vi.s { padding-bottom: 100%; height: 0; }

  /* Reels/shorts: keep full frame (no crop) */
  .vi--contain { background: #000; }
  .vi--contain video { object-fit: contain; }

  /* Shorts grid: verticals (9:16) with one square (4:5) */
  .shorts-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    padding: 10px 80px 10px;
  }
  .shorts-grid .vi { height: 0; }
  .shorts-grid .vi.vert { padding-bottom: 177.77%; }  /* 9:16 */
  .shorts-grid .vi.sq   { padding-bottom: 125%; }      /* 4:5 */

  @media (max-width: 900px) {
    .shorts-grid {
      grid-template-columns: repeat(2, 1fr);
      padding: 10px 20px;
    }
  }

  /* 4:3 loop row override */
  .loop-row--43 .loop-clip--43 {
    aspect-ratio: 4/3;
    padding-bottom: 0;
  }

  /* BLOCK 1 — hero big left + two stacked right */
  .block-1 {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 10px;
    padding: 10px;
  }

  .block-1 .col-right {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .block-1 .col-right .vi.l {
    flex: 1;
    padding-bottom: 0;
    height: 0;
    min-height: 0;
  }

  .block-1 .col-right {
    min-height: 0;
  }

  .block-1 .col-right .vi {
    flex: 1;
    padding-bottom: 56.25%;
    height: 0;
  }

  /* BLOCK 2 — three equal landscape */
  .block-2 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    padding: 0 10px 10px;
  }

  /* BLOCK 3 — one wide leftover */
  .block-3 {
    display: grid;
    grid-template-columns: 3fr 2fr;
    gap: 10px;
    padding: 0 10px 10px;
  }

  .block-3 .filler {
    background: #0f0f0f;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .block-3 .filler span {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: #1e1e1e;
    text-transform: uppercase;
  }

  /* SECTION DIVIDER */
  .sec-div {
    padding: 52px 40px 28px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .sec-div h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 900;
    letter-spacing: -1px;
    white-space: nowrap;
  }

  .sec-div h2 em { font-style: italic; color: var(--red); }

  /* Clean look: hide section titles */
  .sec-div h2 { display: none; }
  .sec-div { padding: 28px 40px 18px; }

  .sec-div .line { flex: 1; height: 1px; background: var(--border); }

  .sec-div .tag {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--red);
    white-space: nowrap;
  }

  /* BLOCK 4 — 4 shorts */
  .block-4 {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 0 10px 10px;
  }

  /* BLOCK 5 — 2 shorts + 1 landscape wide */
  .block-5 {
    display: grid;
    grid-template-columns: 1fr 1fr 2fr;
    gap: 10px;
    padding: 0 10px 10px;
    align-items: start;
  }

  .block-5 .vi-wide {
    position: relative;
    overflow: hidden;
    background: var(--dim);
    padding-bottom: 50%;
    height: 0;
  }

  .block-5 .vi-wide iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  .block-5 .vi-wide:hover .vi-label { opacity: 1; }

  /* PHOTO MASONRY */
  .photo-masonry {
    padding: 0 10px 20px;
    columns: 4;
    column-gap: 12px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .photo-item {
    break-inside: avoid;
    margin-bottom: 12px;
    background: var(--dim);
    border-radius: 14px;
    overflow: hidden;
  }

  .photo-item img {
    width: 100%;
    height: auto;
    display: block;
    transform: scale(1);
    transition: transform 0.35s ease;
  }

  .photo-item:hover img { transform: scale(1.02); }

  .photo-placeholder {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
  }

  .photo-placeholder span {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.2em;
    color: #1e1e1e;
    text-transform: uppercase;
    padding: 16px;
  }

  footer {
    padding: 24px 40px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 52px;
  }

  .wordmark {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 900;
    letter-spacing: 6px;
  }

  .wordmark span { color: var(--red); }

  footer p {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: #222;
    letter-spacing: 0.15em;
  }

  [data-lang="en"] { display: none; }
  [data-lang="it"] { display: block; }
  span[data-lang="en"] { display: none; }
  span[data-lang="it"] { display: inline; }
  body.lang-en [data-lang="it"] { display: none; }
  body.lang-en [data-lang="en"] { display: block; }
  body.lang-en span[data-lang="it"] { display: none; }
  body.lang-en span[data-lang="en"] { display: inline; }

  /* LOOP CLIPS — cinematic gif-row */
  .loop-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    padding: 0 10px 10px;
  }

  .loop-clip {
    position: relative;
    overflow: hidden;
    background: #000;
    aspect-ratio: 16/9;
    cursor: default;
  }

  .loop-clip:first-child {
    border-right: 1px solid var(--border);
  }

  .loop-clip iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  .loop-clip video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.4s ease;
  }

  .loop-label {
    position: absolute;
    bottom: 14px;
    left: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.18);
    pointer-events: none;
    transition: color 0.3s;
  }

  .loop-clip:hover .loop-label {
    color: rgba(255,255,255,0.55);
  }

  @media (max-width: 768px) {
    nav { padding: 0 20px; }
    .page-header { padding: 40px 20px 32px; flex-direction: column; gap: 16px; align-items: flex-start; }
    .block-1 { grid-template-columns: 1fr 1fr; }
    .block-1 .col-right { flex-direction: column; }
    .block-2 { grid-template-columns: 1fr 1fr; }
    .block-3 { grid-template-columns: 1fr 1fr; }
    .block-3 .filler { display: none; }
    .block-4 { grid-template-columns: 1fr 1fr; }
    .block-5 { grid-template-columns: 1fr 1fr; }
    .block-5 .vi-wide { grid-column: span 2; }
    .shorts-grid { grid-template-columns: 1fr 1fr; padding: 10px; }
    [style*="padding:10px 80px"] { padding: 10px !important; }
    .loop-row { grid-template-columns: 1fr 1fr; }
    .photo-masonry { columns: 2; max-width: 720px; }
    .sec-div { padding: 36px 20px 20px; }
    footer { padding: 20px; flex-direction: column; gap: 8px; }
    .vi, .vi-wide { -webkit-overflow-scrolling: touch; }
    .vi iframe, .vi-wide iframe { touch-action: auto; pointer-events: auto; }
  }

  @media (max-width: 480px) {
    .block-1, .block-2, .block-3 { grid-template-columns: 1fr 1fr; }
    .block-4 { grid-template-columns: 1fr 1fr; }
    .shorts-grid { grid-template-columns: 1fr 1fr; }
    .loop-row { grid-template-columns: 1fr 1fr; }
    .photo-masonry { columns: 2; }
    .block-1 .col-right { flex-direction: column; }
  }
</style>
</head>

<script>
  const ASSET_BASE = 'https://adyy44.github.io/adyy';
  function assetUrl(path) {
    if (!path || /^https?:\/\//i.test(path) || path.startsWith('data:') || path.startsWith('//') || path.startsWith('file:')) return path;
    if (!ASSET_BASE) return path;
    return ASSET_BASE + '/' + String(path).replace(/^\/+/, '');
  }
  document.querySelectorAll('img[src]').forEach(img => {
    const s = img.getAttribute('src');
    if (s) img.src = assetUrl(s);
  });
  document.querySelectorAll('video source[src]').forEach(src => {
    const s = src.getAttribute('src');
    if (s) src.src = assetUrl(s);
  });
  document.querySelectorAll('video[poster]').forEach(v => {
    const p = v.getAttribute('poster');
    if (p) v.poster = assetUrl(p);
  });

  function setLang(lang) {
    document.body.classList.toggle('lang-en', lang === 'en');
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.trim() === lang.toUpperCase());
    });
  }

  document.querySelectorAll('img[data-fallback]').forEach(img => {
    img.addEventListener('error', () => {
      const fb = img.getAttribute('data-fallback');
      if (fb && img.src !== fb) img.src = fb;
    }, { once: true });
  });
</script>
