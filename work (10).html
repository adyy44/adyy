<meta charset="UTF-8">

<title>ADYY — Work</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,700&family=DM+Mono:wght@400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070707;
  --fg: #f0ede6;
  --red: #cc0000;
  --dim: #0c0c0c;
  --border: rgba(255,255,255,0.05);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  overflow-x: hidden;
}

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  background: rgba(7,7,7,0.96);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 40px;
  height: 50px;
  backdrop-filter: blur(10px);
}
.nav-logo {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 900;
  color: var(--fg);
  letter-spacing: 6px;
  text-decoration: none;
}
.nav-logo span { color: var(--red); }
.nav-right { display: flex; align-items: center; gap: 28px; }
.nav-back {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: #444;
  text-decoration: none;
  transition: color 0.2s;
}
.nav-back:hover { color: var(--fg); }

/* ── HERO LANDING — 3 category cards ── */
.hero {
  margin-top: 50px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  padding: 40px;
  max-width: 1200px;
  margin-left: auto;
  margin-right: auto;
  height: auto;
}

.cat-card {
  position: relative;
  overflow: hidden;
  cursor: pointer;
  text-decoration: none;
  color: var(--fg);
  border: 1px solid rgba(255,255,255,0.08);
  aspect-ratio: 16/9;
}
.cat-card:last-child { border-right: none; }

/* video/image background */
.cat-card iframe,
.cat-card img {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  border: 0;
  pointer-events: none;
  transition: transform 0.7s ease;
}
.cat-card:hover iframe,
.cat-card:hover img {
  transform: scale(1.04);
}

/* gradient overlay */
.cat-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,.9) 0%, rgba(0,0,0,.4) 60%);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 20px;
  transition: background 0.4s;
}
.cat-card:hover .cat-overlay {
  background: linear-gradient(to top, rgba(0,0,0,.75) 0%, rgba(0,0,0,.2) 70%);
}

.cat-index {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.3em;
  color: var(--red);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.cat-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(20px, 3vw, 36px);
  font-weight: 900;
  line-height: 0.95;
  letter-spacing: -0.5px;
}
.cat-title em { color: var(--red); font-style: italic; }
.cat-meta {
  margin-top: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 7px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
}
.cat-arrow {
  margin-top: 10px;
  font-family: 'DM Mono', monospace;
  font-size: 7px;
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
  transition: color 0.3s, transform 0.3s;
  display: inline-block;
}
.cat-card:hover .cat-arrow {
  color: var(--fg);
  transform: translateY(-2px);
}

@media (max-width: 768px) {
  .hero {
    grid-template-columns: 1fr;
    height: auto;
  }
  .cat-card {
    height: 40vh;
    border-right: none;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
}

/* ── SECTION ANCHOR HEADINGS ── */
.sec-head {
  padding: 72px 40px 28px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.sec-head h2 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(40px, 6vw, 80px);
  font-weight: 900;
  line-height: 0.9;
  letter-spacing: -2px;
}
.sec-head h2 em { color: var(--red); font-style: italic; }
.sec-head .back-top {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: #333;
  text-decoration: none;
  transition: color 0.2s;
  padding-bottom: 6px;
}
.sec-head .back-top:hover { color: var(--fg); }

/* ── VERTICAL FEATURED + GRID LAYOUT ── */
.vertical-featured-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  padding: 40px;
  max-width: 1000px;
  margin: 0 auto;
  align-items: start;
}

.vertical-featured {
  aspect-ratio: 9/16;
  position: relative;
  overflow: hidden;
  background: #000;
}

.vertical-featured iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
}

.vertical-grid-right {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.vertical-grid-right .vi {
  aspect-ratio: 9/16;
  position: relative;
  overflow: hidden;
  background: #000;
}

.vertical-grid-right .vi iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
}

@media (max-width: 900px) {
  .vertical-featured-wrap {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 600px) {
  .vertical-featured-wrap {
    grid-template-columns: 1fr;
    padding: 20px;
  }
  .vertical-grid-right {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* ── SHOWREEL FEATURE ── */
.showreel-wrap {
  padding: 0 40px 8px;
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  gap: 8px;
  align-items: flex-start;
}
.showreel-video {
  position: relative;
  overflow: hidden;
  background: #000;
}
.showreel-video iframe {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  border: none;
}
.showreel-video.r169 { aspect-ratio: 16/9; flex: 16; }
.showreel-video.r43  { aspect-ratio: 4/3;  flex: 12; }
@media (max-width: 600px) {
  .showreel-wrap { flex-direction: column; padding: 0 16px; }
  .showreel-video.r169, .showreel-video.r43 { flex: none; width: 100%; }
}

/* ── VIDEO GRID 16:9 ── */
.video-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 40px;
  max-width: 900px;
  margin: 0 auto;
  justify-items: center;
}
.video-grid .vi {
  aspect-ratio: 16/9;
  position: relative;
  overflow: hidden;
  background: #000;
  width: 100%;
  max-width: 280px;
}
.video-grid .vi iframe {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  border: none;
}
@media (max-width: 900px) { .video-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px) { .video-grid { grid-template-columns: 1fr; padding: 20px; } }

/* ── LOOP CLIPS ── */
.loop-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 0 40px 60px;
  max-width: 1280px;
  margin: 0 auto;
}
.loop-clip {
  aspect-ratio: 16/9;
  background: #000;
  overflow: hidden;
  position: relative;
}
.loop-clip iframe {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  border: 0;
  pointer-events: none;
}
@media (max-width: 1100px) { .loop-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px)  { .loop-grid { grid-template-columns: 1fr; padding: 0 16px 40px; } }

/* ── PHOTO MASONRY ── */
.photo-masonry {
  padding: 0 40px 60px;
  columns: 4;
  column-gap: 8px;
  max-width: 1280px;
  margin: 0 auto;
}
.photo-item {
  break-inside: avoid;
  margin-bottom: 8px;
  overflow: visible;
}
.photo-item img {
  width: 100%;
  height: auto;
  display: block;
  transition: transform 0.4s ease;
  object-fit: contain;
}
.photo-item:hover img { transform: scale(1.03); }
@media (max-width: 900px) { .photo-masonry { columns: 3; } }
@media (max-width: 600px) { .photo-masonry { columns: 2; padding: 0 16px 40px; } }

/* FOOTER */
footer {
  padding: 24px 40px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.wordmark {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  font-weight: 900;
  letter-spacing: 6px;
}
.wordmark span { color: var(--red); }
footer p {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: #222;
  letter-spacing: 0.15em;
}
@media (max-width: 600px) {
  nav { padding: 0 20px; }
  .sec-head { padding: 48px 20px 20px; }
  footer { padding: 20px; flex-direction: column; gap: 8px; }
}
</style>
</head>

<script>
  const ASSET_BASE = 'https://adyy44.github.io/adyy';
  function assetUrl(path) {
    if (!path || /^https?:\/\//i.test(path) || path.startsWith('data:') || path.startsWith('//')) return path;
    return ASSET_BASE + '/' + String(path).replace(/^\/+/, '');
  }
  document.querySelectorAll('img[src]').forEach(img => {
    const s = img.getAttribute('src');
    if (s) img.src = assetUrl(s);
  });

  // smooth scroll to section offset by nav height
  document.querySelectorAll('a[href^="#"]').forEach(a => {
    a.addEventListener('click', e => {
      const id = a.getAttribute('href').slice(1);
      if (!id) return;
      const el = document.getElementById(id);
      if (!el) return;
      e.preventDefault();
      const top = el.getBoundingClientRect().top + window.scrollY - 50;
      window.scrollTo({ top, behavior: 'smooth' });
    });
  });
</script>
